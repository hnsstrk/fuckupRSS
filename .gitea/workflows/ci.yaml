name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-sbom:
    name: Security Scan & SBOM
    runs-on: linux-x64
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-audit-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install security and SBOM tools
        run: |
          pip install semgrep --break-system-packages || pip install semgrep
          cargo install cargo-audit cargo-cyclonedx

      # Security Scans
      - name: Trojan Source Scan
        run: npx anti-trojan-source --files='src/**/*.{js,ts,svelte}' --files='src-tauri/src/**/*.rs'

      - name: Semgrep scan
        run: semgrep scan --config auto --error src-tauri/src/ src/

      - name: Semgrep OWASP
        run: semgrep scan --config p/owasp-top-ten --error src-tauri/src/ src/

      - name: npm audit
        run: npm audit --audit-level=high --omit=dev

      - name: Cargo audit
        run: cargo audit --file src-tauri/Cargo.lock --deny yanked

      # SBOM Generation
      - name: Create sbom directory
        run: mkdir -p sbom

      - name: Generate Frontend SBOM
        run: npx @cyclonedx/cyclonedx-npm --output-file sbom/frontend-bom.json

      - name: Generate Backend SBOM
        run: |
          cd src-tauri
          cargo cyclonedx --format json
          mv fuckuprss.cdx.json ../sbom/backend-bom.json

      - name: Validate SBOMs
        run: |
          node -e "JSON.parse(require('fs').readFileSync('sbom/frontend-bom.json','utf8')); console.log('frontend-bom.json: valid JSON')"
          node -e "JSON.parse(require('fs').readFileSync('sbom/backend-bom.json','utf8')); console.log('backend-bom.json: valid JSON')"

      - name: Upload SBOMs
        uses: actions/upload-artifact@v3
        with:
          name: sbom
          path: sbom/*.json
