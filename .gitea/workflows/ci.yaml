name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Stage 1: Lint & Type Check
  lint:
    name: Lint & Type Check
    runs-on: linux-x64
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Svelte check
        run: npx svelte-check --tsconfig ./tsconfig.json

      - name: TypeScript check
        run: npx tsc --noEmit

  rust-lint:
    name: Rust Lint
    runs-on: linux-x64
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Rust format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

  # Stage 2: Tests (parallel)
  test-frontend:
    name: Frontend Tests
    runs-on: linux-x64
    timeout-minutes: 15
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm ci

      - name: Vitest
        run: npm run test

  test-rust-linux:
    name: Rust Tests (Linux)
    runs-on: linux-x64
    timeout-minutes: 20
    needs: [rust-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Run tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib --bins

  test-rust-macos:
    name: Rust Tests (macOS)
    runs-on: macos-arm64
    timeout-minutes: 20
    needs: [rust-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Run tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib --bins

  test-e2e:
    name: E2E Tests
    runs-on: linux-x64
    timeout-minutes: 15
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # NOTE: Playwright is configured with webServer to start 'npm run dev' (Vite only).
      # E2E tests that require Tauri backend functionality (invoke calls, DB access)
      # will not work in CI without a full Tauri dev server. These tests should either
      # mock Tauri APIs or be run locally with 'npm run tauri dev'.
      - name: Run E2E tests
        run: npm run test:e2e

  # Stage 3: Security
  security:
    name: Security Scan
    runs-on: linux-x64
    timeout-minutes: 10
    needs: [test-frontend, test-rust-linux, test-e2e, test-rust-macos]
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep scan
        run: semgrep scan --config auto --error src-tauri/src/ src/

      - name: npm audit
        run: npm audit --audit-level=high

      - name: Cargo audit
        run: cargo audit --file src-tauri/Cargo.lock

  # Stage 4: Build (parallel)
  build-linux:
    name: Build (Linux)
    runs-on: linux-x64
    timeout-minutes: 30
    needs: [test-frontend, test-rust-linux, security]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Build
        run: npm run tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

  build-macos:
    name: Build (macOS)
    runs-on: macos-arm64
    timeout-minutes: 30
    needs: [test-frontend, test-rust-macos, security]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Build
        run: npm run tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: src-tauri/target/release/bundle/dmg/*.dmg

  # Stage 5: SBOM
  sbom:
    name: Generate SBOM
    runs-on: linux-x64
    timeout-minutes: 10
    needs: [build-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm ci

      - name: Create sbom directory
        run: mkdir -p sbom

      - name: Generate Frontend SBOM
        run: npx @cyclonedx/cyclonedx-npm --output-file sbom/frontend-bom.json

      - name: Generate Backend SBOM
        run: |
          cd src-tauri
          cargo cyclonedx --format json
          mv fuckuprss.cdx.json ../sbom/backend-bom.json

      - name: Validate SBOMs
        run: |
          cyclonedx validate --input-file sbom/frontend-bom.json
          cyclonedx validate --input-file sbom/backend-bom.json

      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom/*.json
